<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LexiSync · Distant Control</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Space Grotesk',sans-serif;background:#0a1628;color:#e8f0fe;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative}
.b1{position:fixed;width:480px;height:480px;border-radius:50%;background:#1a3a8f;filter:blur(120px);opacity:.18;top:-160px;right:-100px;pointer-events:none}
.b2{position:fixed;width:340px;height:340px;border-radius:50%;background:#0d47a1;filter:blur(110px);opacity:.14;bottom:-90px;left:-70px;pointer-events:none}
.noise{position:fixed;inset:0;z-index:1;opacity:.025;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
.grid-lines{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.02;background-image:linear-gradient(rgba(77,163,255,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(77,163,255,.8) 1px,transparent 1px);background-size:64px 64px}
nav{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.8rem;background:rgba(10,22,40,.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(77,163,255,.1);flex-shrink:0}
.nav-back{display:flex;align-items:center;gap:7px;text-decoration:none;color:rgba(232,240,254,.32);font-size:.8rem;transition:color .2s;font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.nav-back:hover{color:#7ab8ff}
.nav-title{font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:rgba(232,240,254,.6)}
.live{display:flex;align-items:center;gap:6px;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:#4ade80;font-family:'JetBrains Mono',monospace}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.main{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;gap:1.4rem;padding:1.5rem 2rem;min-height:0}
.video-wrap{background:rgba(8,18,36,.7);border:1px solid rgba(77,163,255,.12);border-radius:16px;overflow:hidden;position:relative;width:65%;max-width:600px;height:65%;max-height:460px;align-self:center;justify-self:center}
.video-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.vid-tag{position:absolute;top:13px;left:13px;background:rgba(10,22,40,.75);backdrop-filter:blur(8px);border:1px solid rgba(77,163,255,.12);border-radius:7px;padding:3px 10px;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(122,184,255,.4);font-family:'JetBrains Mono',monospace}
.sidebar{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:.9rem;overflow-y:auto;align-self:center}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(77,163,255,.15);border-radius:3px}
.glass{background:rgba(16,36,72,.55);border:1px solid rgba(77,163,255,.1);backdrop-filter:blur(20px);border-radius:14px;padding:1.1rem}
.sec-label{font-size:.57rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(122,184,255,.3);font-family:'JetBrains Mono',monospace;margin-bottom:.8rem;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:rgba(77,163,255,.08)}
.relay-center{display:flex;flex-direction:column;align-items:center;gap:.8rem;padding:.4rem 0 .6rem}
.relay-orb{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.7rem;position:relative;transition:all .5s ease}
.relay-orb::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:1.5px solid transparent;transition:all .5s}
.relay-orb.off{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.15)}
.relay-orb.off::before{border-color:rgba(248,113,113,.18)}
.relay-orb.on{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.22);box-shadow:0 0 28px rgba(74,222,128,.1)}
.relay-orb.on::before{border-color:rgba(74,222,128,.35);box-shadow:0 0 16px rgba(74,222,128,.12)}
.relay-state{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;letter-spacing:.06em;transition:color .5s}
.relay-state.on{color:#4ade80}.relay-state.off{color:#f87171}
.relay-sub{font-size:.67rem;color:rgba(200,220,248,.28);font-family:'JetBrains Mono',monospace;letter-spacing:.04em;text-align:center}
.esp-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:rgba(30,60,120,.2);border:1px solid rgba(77,163,255,.08);border-radius:9px;font-size:.7rem;color:rgba(200,220,248,.3);margin-top:.3rem;font-family:'JetBrains Mono',monospace}
.esp-row i{color:#4da3ff;font-size:.75rem}
.gr{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border-radius:9px;background:rgba(30,60,120,.2);border:1px solid rgba(77,163,255,.07);margin-bottom:6px}
.gr:last-child{margin-bottom:0}
.gr-acc{border-left:2px solid var(--c);border-radius:0}
.em{font-size:1.2rem;min-width:28px;text-align:center;line-height:1.1}
.gi strong{display:block;font-size:.8rem;font-weight:500;color:#c8dcf8;margin-bottom:1px}
.gi span{font-size:.7rem;color:rgba(200,220,248,.35);line-height:1.5}
</style>
</head>
<body onload="fetch('/set_mode/distant')">
<div class="b1"></div><div class="b2"></div>
<div class="noise"></div><div class="grid-lines"></div>
<nav>
  <a href="/" class="nav-back"><i class="fas fa-chevron-left" style="font-size:.68rem"></i>&nbsp;hub</a>
  <span class="nav-title">Distant Control</span>
  <span class="live"><span class="live-dot"></span>system live</span>
</nav>
<div class="main">
  <div class="video-wrap">
    <span class="vid-tag">camera feed</span>
    <img src="/video_feed" alt="Camera Feed">
  </div>
  <div class="sidebar">
    <div class="glass">
      <div class="sec-label">Relay status</div>
      <div class="relay-center">
        <div class="relay-orb off" id="relay-orb">💡</div>
        <div class="relay-state off" id="relay-state">OFF</div>
        <div class="relay-sub" id="relay-sub">waiting for gesture…</div>
      </div>
      <div class="esp-row"><i class="fas fa-microchip"></i>esp32 · 172.20.10.6</div>
    </div>
    <div class="glass">
      <div class="sec-label">Gesture map</div>
      <div class="gr gr-acc" style="--c:#4ade80"><span class="em">🖐️</span><div class="gi"><strong>Relay ON</strong><span>Open hand — all 5 fingers</span></div></div>
      <div class="gr gr-acc" style="--c:#f87171"><span class="em">✊</span><div class="gi"><strong>Relay OFF</strong><span>Closed fist</span></div></div>
    </div>
  </div>
</div>
<script>
function setRelay(on){
  const orb=document.getElementById('relay-orb');
  const st=document.getElementById('relay-state');
  const sub=document.getElementById('relay-sub');
  orb.className='relay-orb '+(on?'on':'off');
  st.className='relay-state '+(on?'on':'off');
  st.textContent=on?'ON':'OFF';
  sub.textContent=on?'relay active':'waiting for gesture…';
}
setInterval(()=>{fetch('/relay_status').then(r=>r.json()).then(d=>setRelay(d.relay)).catch(()=>{})},1000);
</script>
</body>
</html>
